<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GX Sync Pro | Live Session Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
        body {
            background-color: var(--bg);
            color: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        .premium-glass {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-input, .code-area {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        .list-card { transition: all 0.3s ease; border-left-width: 5px; }
        .list-card:hover { transform: translateY(-3px); background: rgba(51, 65, 85, 0.8); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Modal Animation */
        #modal { display: none; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        #modal.active { display: flex; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="modal">
        <div class="premium-glass p-10 rounded-[3rem] max-w-sm w-full text-center border border-white/20 shadow-2xl">
            <h3 class="text-xl font-black mb-6 uppercase tracking-widest text-blue-400">Select Category</h3>
            <div class="flex flex-col gap-4">
                <button onclick="loadPreset(1)" class="py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold uppercase tracking-widest transition-all">Category One</button>
                <button onclick="loadPreset(2)" class="py-4 bg-purple-600 hover:bg-purple-500 rounded-2xl font-bold uppercase tracking-widest transition-all">Category Two</button>
                <button onclick="closeModal()" class="text-xs text-gray-500 mt-2 hover:text-white">Cancel</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-5xl font-black italic text-white uppercase tracking-tighter">
                GX<span class="text-blue-500 text-6xl">.</span>SYNC
            </h1>
            <p class="text-blue-400 text-[11px] uppercase font-bold tracking-[5px] mt-2">Live Session Editor</p>
            
            <div class="mt-8 flex flex-col items-center gap-4">
                <span id="counter" class="bg-blue-500/10 text-blue-400 px-6 py-2 rounded-full text-xs font-black border border-blue-500/20 shadow-xl">
                    0 ITEMS IN SESSION
                </span>
                <button onclick="openModal()" class="bg-white/5 hover:bg-white/10 border border-white/10 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">
                    ⚡ Load Data Preset
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-5 space-y-8">
                <div class="premium-glass p-8 rounded-[3rem]">
                    <h2 class="text-xs font-black text-blue-400 uppercase mb-8">Quick Entry</h2>
                    <div class="space-y-5">
                        <input type="text" id="title" placeholder="Entry Title" class="custom-input w-full p-5 rounded-2xl text-sm">
                        <input type="text" id="link" placeholder="Source URL" class="custom-input w-full p-5 rounded-2xl text-sm">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="cat" class="custom-input w-full p-5 rounded-2xl text-sm text-white">
                                <option value="app">🚀 App</option>
                                <option value="file">📁 File</option>
                                <option value="web">🌐 Web</option>
                            </select>
                            <input type="color" id="color" value="#3b82f6" class="w-full h-[60px] bg-transparent border-none cursor-pointer">
                        </div>
                        <input type="hidden" id="edit-index" value="-1">
                        <button onclick="handleSave()" id="save-btn" class="w-full py-5 bg-blue-600 text-white font-black uppercase tracking-widest rounded-2xl hover:bg-blue-500 transition-all">
                            Add to Session
                        </button>
                    </div>
                </div>

                <div class="premium-glass p-7 rounded-[3rem]">
                    <div class="flex justify-between items-center mb-5 px-2">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Live JSON Output</span>
                        <button onclick="copyCode()" id="copy-btn" class="text-[10px] bg-white/10 text-white px-4 py-2 rounded-xl font-bold transition-all">COPY JSON</button>
                    </div>
                    <textarea id="json-box" class="code-area w-full h-56 p-6 rounded-2xl font-mono text-[11px] text-blue-300 leading-relaxed" placeholder="Paste data or watch live updates..."></textarea>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div id="list-container" class="space-y-5 max-h-[80vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
        </div>
    </div>

    <script>
        let dataStore = [];
        const jsonBox = document.getElementById('json-box');
        const modal = document.getElementById('modal');

        const presets = {
            1: [
                { "title": "GX technology", "link": "https://github.com/guui68/Downloading-apps/releases/download/v1.1/_Prayer__Time_19519243.apk", "cat": "app", "color": "#ffff00" },
                { "title": "Tasnim.Ayesha.and.Tasnim", "link": "https://github.com/guui68/Downloading-apps/releases/download/v3.3/Tasnim.Ayesha.and.Tasnim.Muntasir.viral.link.zip", "cat": "file", "color": "#ffff00" },
                { "title": "Prayer times", "link": "https://github.com/guui68/Downloading-apps/releases/download/v1.1/_Prayer__Time_19519243.apk", "cat": "app", "color": "#ffff00" },
                { "title": "photo_editing_all_files_", "link": "https://github.com/guui68/Downloading-apps/releases/download/v4.6/photo_editing_all_files_--.zip", "cat": "file", "color": "#000000" },
                { "title": "HA.Facebook", "link": "https://github.com/guui68/Downloading-apps/releases/download/v5.9/Facebook_1.0.apk", "cat": "app", "color": "#3b82f6" }
            ],
            2: [
                { "title": "Translate", "url": "https://guui68.github.io/GX-translate/" },
                { "title": "My Admin", "url": "https://guui68.github.io/Photo-to-text/admin.html" },
                { "title": "Rent receipt", "url": "https://guui68.github.io/Rent/" },
                { "title": "Hasibul's WiFi ", "url": "https://guui68.github.io/XG-sammim/" },
                { "title": "Tik Tok video download", "url": "https://guui68.github.io/GX-sammim/" },
                { "title": "Number sent", "url": "https://sammim1.github.io/Sammim3/" },
                { "title": "Prayer and iftar time", "url": "https://sammim1.github.io/Tempkey.json/" },
                { "title": "Photo and file sent", "url": "https://sammim1.github.io/Prayer-times-/" },
                { "title": "GX download store", "url": "https://guui68.github.io/Downloading-apps/" }
            ]
        };

        function openModal() { modal.classList.add('active'); }
        function closeModal() { modal.classList.remove('active'); }

        function loadPreset(type) {
            dataStore = JSON.parse(JSON.stringify(presets[type]));
            renderUI(true);
            closeModal();
        }

        jsonBox.addEventListener('input', () => {
            const val = jsonBox.value.trim();
            if(!val) { dataStore = []; renderUI(false); return; }
            try {
                const parsed = JSON.parse(val);
                if (Array.isArray(parsed)) { dataStore = parsed; renderUI(false); }
            } catch (e) {
                const urlPattern = /(https?:\/\/[^\s]+)/g;
                const foundUrls = val.match(urlPattern);
                if (foundUrls) {
                    foundUrls.forEach(url => {
                        dataStore.unshift({ title: "New Resource", link: url, cat: "web", color: "#3b82f6" });
                    });
                    renderUI(true);
                }
            }
        });

        function handleSave() {
            const title = document.getElementById('title').value;
            const link = document.getElementById('link').value;
            const index = document.getElementById('edit-index').value;
            if (!title || !link) return alert("Fill fields!");

            const item = { title, link, cat: document.getElementById('cat').value, color: document.getElementById('color').value };
            if (index === "-1") dataStore.unshift(item);
            else { dataStore[index] = item; resetForm(); }

            renderUI(true);
            document.getElementById('title').value = '';
            document.getElementById('link').value = '';
        }

        function renderUI(updateBox = false) {
            const list = document.getElementById('list-container');
            list.innerHTML = '';
            document.getElementById('counter').innerText = `${dataStore.length} ITEMS IN SESSION`;

            if (dataStore.length === 0) {
                list.innerHTML = `<div class="p-20 text-center text-gray-600 italic opacity-50">No items in this session. Start adding or paste JSON.</div>`;
            }

            dataStore.forEach((item, index) => {
                const displayLink = item.link || item.url || "#";
                list.innerHTML += `
                    <div class="list-card premium-glass p-7 rounded-[2.5rem] flex items-center justify-between gap-4 border-l-[6px]" style="border-left-color: ${item.color || '#3b82f6'}">
                        <div class="flex-1 min-w-0">
                            <span class="text-[9px] font-black uppercase text-blue-400 bg-blue-400/10 px-2 py-0.5 rounded">${item.cat || 'Web'}</span>
                            <h3 class="text-xl font-bold text-white truncate mt-2">${item.title || "Untitled"}</h3>
                            <p class="text-[11px] text-gray-500 truncate font-mono mt-1 opacity-70">${displayLink}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="editItem(${index})" class="p-4 bg-white/5 hover:bg-yellow-500/20 text-yellow-500 rounded-2xl transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="2" stroke-linecap="round"></path></svg>
                            </button>
                            <button onclick="deleteItem(${index})" class="p-4 bg-white/5 hover:bg-red-500/20 text-red-500 rounded-2xl transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round"></path></svg>
                            </button>
                        </div>
                    </div>`;
            });
            if (updateBox) jsonBox.value = JSON.stringify(dataStore, null, 2);
        }

        function deleteItem(index) {
            dataStore.splice(index, 1);
            renderUI(true);
        }

        function editItem(index) {
            const itm = dataStore[index];
            document.getElementById('title').value = itm.title || "";
            document.getElementById('link').value = itm.link || itm.url || "";
            document.getElementById('cat').value = itm.cat || "web";
            document.getElementById('color').value = itm.color || "#3b82f6";
            document.getElementById('edit-index').value = index;
            document.getElementById('save-btn').innerText = "Update Now";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('edit-index').value = "-1";
            document.getElementById('save-btn').innerText = "Add to Session";
        }

        function copyCode() {
            jsonBox.select();
            document.execCommand('copy');
            const btn = document.getElementById('copy-btn');
            btn.innerText = "COPIED! ✅";
            setTimeout(() => btn.innerText = "COPY JSON", 2000);
        }
    </script>
</body>
</html>
